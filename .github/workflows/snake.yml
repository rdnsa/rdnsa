name: Generate Contribution Visuals

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GITHUB_USERNAME: rdnsa
      PROFILE_COMMIT_NAME: rdnsa
      PROFILE_COMMIT_EMAIL: 165114761+rdnsa@users.noreply.github.com

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ env.GITHUB_USERNAME }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          # Add CONTRIBUTION_TOKEN from the rdnsa account with read:user to include private/internal contribution counts.
          GITHUB_TOKEN: ${{ secrets.CONTRIBUTION_TOKEN || github.token }}

      - name: Update contribution dashboard, log, and snake tooltips
        run: node scripts/update-contribution-log.mjs
        env:
          # Add CONTRIBUTION_TOKEN from the rdnsa account with read:user to include private/internal contribution counts.
          GITHUB_TOKEN: ${{ secrets.CONTRIBUTION_TOKEN || github.token }}

      - name: Commit README contribution log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "README contribution log is already up to date."
          else
            git commit --author="${PROFILE_COMMIT_NAME} <${PROFILE_COMMIT_EMAIL}>" -m "Update contribution daily log"
            git push
          fi

      - name: Push contribution visuals to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ github.token }}
